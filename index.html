<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b64d2c" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <title>Carillon — content-free push notifications &amp; webhooks</title>
    <meta
      name="description"
      content="Carillon holds a live connection to your accounts and sends a small, signed, content-free ping the instant your mail or contacts change. It signals — it never syncs, stores, or reads your data."
    />
    <link rel="canonical" href="https://carillon.pimalaya.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Carillon" />
    <meta property="og:title" content="Carillon — content-free push notifications & webhooks" />
    <meta
      property="og:description"
      content="A hosted watcher that turns a change on a remote into a signed, content-free webhook. It signals; it never syncs."
    />
    <meta property="og:url" content="https://carillon.pimalaya.org/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://carillon.pimalaya.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Carillon — content-free push notifications and webhooks"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Carillon — content-free push notifications & webhooks" />
    <meta
      name="twitter:description"
      content="A hosted watcher that turns a change on a remote into a signed, content-free webhook. It signals; it never syncs."
    />
    <meta name="twitter:image" content="https://carillon.pimalaya.org/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
