<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b64d2c" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <link rel="manifest" href="/site.webmanifest" />

    <title>Carillon: account-change notifier for email, contacts &amp; calendar</title>
    <meta
      name="description"
      content="Carillon is an account-change notifier: a hosted watcher that keeps a live connection to your email, contacts, and calendar and pings you the instant something changes, by signed webhook or phone push. It signals; it never syncs or reads your data."
    />
    <link rel="canonical" href="https://carillon.pimalaya.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Carillon" />
    <meta property="og:title" content="Carillon: account-change notifier for email, contacts &amp; calendar" />
    <meta
      property="og:description"
      content="A hosted watcher that pings you the instant your email, contacts, or calendar change. Real-time notifications by webhook or phone; it signals, never syncs."
    />
    <meta property="og:url" content="https://carillon.pimalaya.org/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://carillon.pimalaya.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Carillon: account-change notifier for email, contacts, and calendar"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Carillon: account-change notifier for email, contacts &amp; calendar" />
    <meta
      name="twitter:description"
      content="A hosted watcher that pings you the instant your email, contacts, or calendar change. Real-time notifications by webhook or phone; it signals, never syncs."
    />
    <meta name="twitter:image" content="https://carillon.pimalaya.org/og-image.png" />
